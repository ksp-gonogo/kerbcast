// Clone-safe TUFX profile for kerbcast's captured cameras. Pinned onto the
// clones via the TUFXProfile setting so streams still get TUFX bloom and the
// general look, without the two effects that break offscreen clone rendering:
//
//   AmbientOcclusion: a depth-based screen-space pass that drew fixed-position
//     dark bands on every clone (the "black lines" artifact).
//   AutoExposure: darkened the galaxy-layer render to black and dimmed the
//     Hullcam reticle overlay on the streams.
//
// The player's own view is unaffected; it keeps whatever profile the player
// runs. TUFX discovers this by scanning GameData for TUFX_PROFILE nodes, so it
// is inert when TUFX is not installed. Bloom is kept because the Scatterer
// sunflare needs it to read as a flare rather than a bare dot.
TUFX_PROFILE
{
	name = Kerbcast-Clone
	hdr = True
	Antialiasing
	{
		Mode = FastApproximateAntialiasing
	}
	SecondaryCameraAntialiasing
	{
		Mode = FastApproximateAntialiasing
	}
	EFFECT
	{
		name = Bloom
		Intensity = 2
		SoftKnee = 0.65
	}
}
