name: release

# Triggered on v* tags. Linked jobs:
#
#   publish-sdk    (~1 min)   regenerates the typeshare bindings from Rust,
#                             verifies version sync, publishes @ksp-gonogo/kerbcast
#                             and @ksp-gonogo/kerbcast-react to public npm via
#                             OIDC trusted publishing.
#   build-sidecar  (matrix)   builds one sidecar per supported runtime — Linux
#                             (tier-1 libva, glibc-floored + lib-bundled), macOS
#                             arm64 and Windows x64 (tier-2 software encode, no
#                             native deps) — and uploads each as a per-rid
#                             artifact.
#   build-windows-shaders     builds the kerbcast-shaders.windows bundle on a
#                  (~15 min)  windows-2022 runner with the native Windows
#                             shader compiler, then smoke-renders its d3d11
#                             variants on a real D3D11 device. The Linux
#                             editor's d3d11 cross-compile shipped invalid
#                             vertex shader blobs in v0.19.0 (E_INVALIDARG at
#                             draw time, black NightVision streams); see
#                             build-kerbcast-shaders.yml for the full story.
#   bundle         (~11 min)  collects the per-rid sidecar artifacts and the
#                             Windows shader bundle, builds the plugin DLL +
#                             Linux/macOS shader bundles, assembles the
#                             complete GameData/Kerbcast/ install tree, and creates
#                             the GitHub Release. needs publish-sdk so a Release
#                             never claims packages that failed to publish, and a
#                             mis-cut tag fails in about a minute instead of after
#                             the Unity builds.
#
# "Re-run failed jobs" re-runs whichever half failed without repeating the
# other.
#
# The Linux sidecar build + the bundle/assemble job run on ubuntu-22.04 (glibc
# 2.35) so bundled .so files stay within the Steam Deck's pressure-vessel glibc
# floor (Steam Runtime 3 = glibc 2.36). macOS/Windows sidecars are software-
# encode only (OpenH264, statically built) so they carry no host-glibc concern
# and bundle no sibling libs.
#
# Publishes to public npm under the @ksp-gonogo scope via OIDC trusted
# publishing (npmjs.com trusts this repo's release workflow — no NPM_TOKEN
# stored or rotated). pnpm rewrites workspace:^ to real semver ranges in the
# published tarballs. Requires npm >= 11.5.1 and `permissions: id-token: write`.
#
# Secrets required:
#   KSP_MANAGED_TOKEN — fine-grained PAT (Contents: read) for ksp-gonogo/ksp-managed
#   UNITY_USERNAME / UNITY_PASSWORD — Unity Personal license for shader builds
#
# Signing secrets (optional — steps skip gracefully when absent, so the build
# still works without certs). All PROPOSED names, not yet provisioned:
#   APPLE_CODESIGN_P12_BASE64 / APPLE_CODESIGN_PASSWORD — Developer ID cert
#   APPLE_CODESIGN_IDENTITY                              — "Developer ID Application: ..."
#   APPLE_NOTARY_KEY_BASE64 / APPLE_NOTARY_KEY_ID / APPLE_NOTARY_ISSUER_ID
#                                                       — App Store Connect API key for notarytool
#   WINDOWS_CERT_PFX_BASE64 / WINDOWS_CERT_PASSWORD     — Authenticode code-signing cert

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

jobs:
  publish-sdk:
    name: publish SDK packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + typeshare binary
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin/typeshare
          key: ${{ runner.os }}-typeshare-cli-1.13.4

      - name: Install typeshare-cli
        run: |
          if ! command -v typeshare >/dev/null 2>&1; then
            cargo install typeshare-cli --version 1.13.4 --locked
          fi
          typeshare --version

      # The Rust protocol is the source of truth: publish from a fresh regen,
      # never from the committed copy.
      - name: Regenerate TS bindings
        run: |
          typeshare ./sidecar/src \
            --lang=typescript \
            --output-file=client-sdk/typescript/src/__generated__/types.ts

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          registry-url: https://registry.npmjs.org
          scope: "@ksp-gonogo"

      # OIDC trusted publishing needs npm >= 11.5.1; setup-node's bundled npm
      # is older than that on the Node 22 runner image.
      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@latest

      - name: Verify version sync (tag == Cargo.toml == package.json == Kerbcast.version)
        run: |
          TAG_VER="${GITHUB_REF_NAME#v}"
          PKG_VER="$(node -p "require('./client-sdk/typescript/package.json').version")"
          REACT_VER="$(node -p "require('./client-sdk/react/package.json').version")"
          CARGO_VER="$(grep -m1 '^version = ' sidecar/Cargo.toml | sed -E 's/version = "(.*)"/\1/')"
          AVC_VER="$(python3 -c "import json; v=json.load(open('GameData/Kerbcast/Kerbcast.version'))['VERSION']; print(f\"{v['MAJOR']}.{v['MINOR']}.{v['PATCH']}\")")"
          echo "tag=$TAG_VER cargo=$CARGO_VER typescript=$PKG_VER react=$REACT_VER avc=$AVC_VER"
          if [ "$TAG_VER" != "$CARGO_VER" ] || [ "$CARGO_VER" != "$PKG_VER" ] || [ "$PKG_VER" != "$REACT_VER" ] || [ "$REACT_VER" != "$AVC_VER" ]; then
            echo "::error::version mismatch: run ./scripts/bump-version.sh $TAG_VER and re-tag"
            exit 1
          fi

      - name: Install workspace dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build all packages
        run: pnpm -r build

      # Core first so the registry has the dependency when react is indexed.
      # No NODE_AUTH_TOKEN: OIDC trusted publishing authenticates via the
      # id-token permission above, not a stored credential.
      - name: Publish @ksp-gonogo/kerbcast to npm
        working-directory: client-sdk/typescript
        run: npm publish

      - name: Publish @ksp-gonogo/kerbcast-react to npm
        working-directory: client-sdk/react
        run: npm publish

  # One sidecar per supported runtime. Linux must build on ubuntu-22.04 (glibc
  # floor) with ffmpeg/libva for the tier-1 libva backend + sibling-lib bundle;
  # macOS and Windows build on their native runners (VideoToolbox/MSVC can't be
  # cross-compiled from Linux) and ship the always-on software encoder only.
  # Each job produces a per-rid artifact whose contents lay out exactly as they
  # land under GameData/Kerbcast/Sidecar/<rid>/ — the assemble job just copies.
  build-sidecar:
    name: build sidecar (${{ matrix.rid }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: linux-x64
            runner: ubuntu-22.04
            bin: kerbcast-sidecar
          - rid: osx-arm64
            runner: macos-14
            bin: kerbcast-sidecar
          - rid: win-x64
            runner: windows-2022
            bin: kerbcast-sidecar.exe
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      # Tier-1 libva backend needs ffmpeg + VA-API headers/libs at link time;
      # only on Linux (the ffmpeg-next dep is cfg(target_os="linux")-gated).
      - name: Install ffmpeg + VA-API system libs (Linux)
        if: matrix.rid == 'linux-x64'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config clang libclang-dev \
            libavcodec-dev libavutil-dev libavformat-dev \
            libavfilter-dev libswscale-dev libva-dev

      # OpenH264's "source" feature compiles the codec's asm — provide an
      # assembler on the platforms that don't ship one in the runner image.
      # (Verified unnecessary on a local aarch64 build, but the CI runner
      # environment differs; cheap insurance on mac/win.)
      - name: Install nasm (macOS)
        if: matrix.rid == 'osx-arm64'
        run: brew install nasm
      - name: Install nasm (Windows)
        if: matrix.rid == 'win-x64'
        uses: ilammy/setup-nasm@v1

      - name: Install stable Rust + components
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            sidecar/target
          key: ${{ matrix.rid }}-cargo-${{ hashFiles('sidecar/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.rid }}-cargo-

      - name: Build sidecar
        working-directory: sidecar
        run: cargo build --release

      # Linux: self-contained bundle. Copy the binary + the non-system shared
      # libs it links against (ffmpeg, etc) into lib/, denylisting stable system
      # libs and libva (driver shim, must match host Mesa — see sidecar-ci.yml
      # for the full rationale). The plugin prepends this lib/ to LD_LIBRARY_PATH.
      - name: Stage Linux sidecar + bundled shared libs
        if: matrix.rid == 'linux-x64'
        run: |
          set -euo pipefail
          mkdir -p staging-sidecar/lib
          cp sidecar/target/release/kerbcast-sidecar staging-sidecar/

          deps="$(ldd staging-sidecar/kerbcast-sidecar \
            | awk '/=>/ && $3 ~ /^\// {print $3}' \
            | grep -Ev '/(libc|libm|libpthread|libdl|librt|libstdc\+\+|libgcc_s)[.\-]' \
            | grep -Ev '/(ld-linux|linux-vdso)' \
            | grep -v libva \
            || true)"
          if [ -z "$deps" ]; then
            echo "::error::ldd found no bundleable non-system deps — refusing to upload a non-self-contained artefact"
            ldd staging-sidecar/kerbcast-sidecar
            exit 1
          fi
          echo "Bundling:"
          echo "$deps"
          while IFS= read -r src; do
            [ -z "$src" ] && continue
            real="$(readlink -f "$src")"
            soname="$(basename "$src")"
            cp "$real" "staging-sidecar/lib/$soname"
          done <<< "$deps"

      # macOS/Windows: software encode, no sibling libs. Just the binary.
      - name: Stage macOS/Windows sidecar
        if: matrix.rid != 'linux-x64'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p staging-sidecar
          cp "sidecar/target/release/${{ matrix.bin }}" "staging-sidecar/${{ matrix.bin }}"

      # PROPOSED signing — gated on the cert secrets being present so the build
      # works without them. Secrets can't be used directly in `if:`; map to env
      # first. Scaffold only: fills in once certs are provisioned (README TODOs
      # "Codesign and notarise macOS sidecar binaries" / "Establish SmartScreen
      # reputation"). Until then mac binaries are quarantined by Gatekeeper and
      # Windows .exe trips SmartScreen on first run.
      - name: Codesign + notarise (macOS)
        if: matrix.rid == 'osx-arm64'
        shell: bash
        env:
          HAS_SIGNING: ${{ secrets.APPLE_CODESIGN_P12_BASE64 != '' }}
        run: |
          if [ "$HAS_SIGNING" != "true" ]; then
            echo "::notice::APPLE_CODESIGN_* secrets absent — shipping unsigned macOS sidecar (Gatekeeper will quarantine)"
            exit 0
          fi
          echo "::error::macOS codesign+notarytool not yet implemented — TODO: import APPLE_CODESIGN_P12_BASE64 into a temp keychain, codesign --options runtime staging-sidecar/${{ matrix.bin }}, then notarytool submit + staple"
          exit 1

      - name: Sign (Windows)
        if: matrix.rid == 'win-x64'
        shell: bash
        env:
          HAS_SIGNING: ${{ secrets.WINDOWS_CERT_PFX_BASE64 != '' }}
        run: |
          if [ "$HAS_SIGNING" != "true" ]; then
            echo "::notice::WINDOWS_CERT_PFX_BASE64 absent — shipping unsigned Windows sidecar (SmartScreen friction on first run)"
            exit 0
          fi
          echo "::error::Windows signtool step not yet implemented — TODO: decode WINDOWS_CERT_PFX_BASE64 and signtool sign /fd sha256 /tr <timestamp> staging-sidecar/${{ matrix.bin }}"
          exit 1

      - name: Upload per-rid sidecar artifact
        uses: actions/upload-artifact@v7
        with:
          name: kerbcast-sidecar-${{ matrix.rid }}
          path: staging-sidecar
          if-no-files-found: error

  # Native-toolchain build of the Windows shader bundle. Mirrors the
  # build-windows job in build-kerbcast-shaders.yml: the 2019.4 Linux editor's
  # d3d11 cross-compile emits vertex shader blobs the Windows D3D11 runtime
  # rejects with E_INVALIDARG while shader.isSupported stays true, so the
  # Windows bundle must come from a Windows editor and be smoke-rendered on a
  # real D3D11 device (the runner's WARP rasterizer validates the bytecode in
  # Create*Shader). Runs in parallel with build-sidecar; the bundle job's own
  # Unity activation happens only after this job releases the license.
  build-windows-shaders:
    name: build Windows shader bundle
    runs-on: windows-2022
    env:
      UNITY_VERSION: 2019.4.40f1 (ffc62b691db5)
    steps:
      - uses: actions/checkout@v6

      - name: Set up Unity Hub + Editor
        uses: buildalon/unity-setup@v2
        with:
          unity-version: ${{ env.UNITY_VERSION }}
          version-file: "None"
          build-targets: StandaloneWindows64
          # NOT cached: a cache-restored Windows Unity install exits
          # instantly without writing a log (run 27330133502); see
          # build-kerbcast-shaders.yml. Fresh install ~10 min per release.
          cache-installation: false

      - name: Activate Unity Personal license
        uses: buildalon/activate-unity-license@v2
        with:
          license: "Personal"
          username: ${{ secrets.UNITY_USERNAME }}
          password: ${{ secrets.UNITY_PASSWORD }}

      - name: Build kerbcast-shaders AssetBundle (windows)
        working-directory: ci/kerbcast-shaders
        shell: bash
        run: |
          status=0
          "$UNITY_EDITOR_PATH" \
            -batchmode -nographics -quit \
            -projectPath "$(pwd)" \
            -executeMethod KerbcastCI.BuildKerbcastShaders.BuildWindows \
            -buildTarget Win64 \
            -logFile unity-build.log || status=$?
          cat unity-build.log 2>/dev/null || echo "::error::Unity wrote no log (exit $status): editor launch failed before logging"
          [ "$status" -eq 0 ] || exit "$status"
          ls -la Bundles-windows/

      - name: Shader render smoke test (Windows bundle, d3d11)
        working-directory: ci/kerbcast-shaders
        timeout-minutes: 10
        shell: bash
        env:
          KERBCAST_SMOKE_BUNDLE_DIR: Bundles-windows
        run: |
          status=0
          "$UNITY_EDITOR_PATH" \
            -batchmode -quit \
            -projectPath "$(pwd)" \
            -executeMethod KerbcastCI.ShaderSmoke.RenderAll \
            -buildTarget Win64 \
            -logFile unity-smoke.log || status=$?
          cat unity-smoke.log 2>/dev/null || echo "::error::Unity wrote no log (exit $status): editor launch failed before logging"
          exit "$status"

      - name: Upload Windows shader bundle artifact
        uses: actions/upload-artifact@v7
        with:
          name: kerbcast-shaders-windows
          path: ci/kerbcast-shaders/Bundles-windows/kerbcast-shaders
          if-no-files-found: error

  bundle:
    name: GameData bundle + GitHub Release
    needs: [publish-sdk, build-sidecar, build-windows-shaders]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    env:
      UNITY_VERSION: 2019.4.40f1 (ffc62b691db5)
      HULLCAM_REPO: linuxgurugamer/HullcamVDSContinued
      HULLCAM_REF: master
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Collect every per-rid sidecar artifact. download-artifact unpacks each
      # under sidecar-artifacts/<artifact-name>/ preserving the staged layout
      # (binary [+ lib/ for linux]). The assemble step maps name -> rid subdir.
      - name: Download sidecar artifacts
        uses: actions/download-artifact@v8
        with:
          path: sidecar-artifacts
          pattern: kerbcast-sidecar-*

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.x"

      - name: Checkout KSP assemblies
        uses: actions/checkout@v6
        with:
          repository: ksp-gonogo/ksp-managed
          token: ${{ secrets.KSP_MANAGED_TOKEN }}
          path: ksp-managed

      - name: Build Kerbcast.dll
        run: |
          dotnet build Plugin/Kerbcast.csproj -c Release \
            /p:KspManaged="${{ github.workspace }}/ksp-managed/KSP_Data/Managed" \
            /p:KspGameData="${{ github.workspace }}/ksp-managed/GameData"

      - name: Checkout HullcamVDSContinued (shader source)
        uses: actions/checkout@v6
        with:
          repository: ${{ env.HULLCAM_REPO }}
          ref: ${{ env.HULLCAM_REF }}
          path: hullcam

      - name: Drop kerbcast build script into HullcamVDS project
        run: |
          mkdir -p hullcam/HullCameraAssets/Assets/Editor
          rm -f hullcam/HullCameraAssets/Assets/Editor/CreateAssetBundles.cs
          cp ci/hullcam-shaders/BuildShaderBundle.cs \
             hullcam/HullCameraAssets/Assets/Editor/BuildShaderBundle.cs

      - name: Set up Unity Hub + Editor
        uses: buildalon/unity-setup@v2
        with:
          unity-version: ${{ env.UNITY_VERSION }}
          version-file: "None"
          # macOS player-support is for the kerbcast-shaders.osx bundle; the
          # HullcamVDS shaders.linux build stays Linux-only. The cross-target
          # must be requested as a Hub module id via `modules` because the
          # action rejects non-host build-targets on Linux. The Windows bundle comes
          # from the build-windows-shaders job (native toolchain), not from a
          # windows-mono cross-compile here.
          build-targets: StandaloneLinux64
          modules: mac-mono
          cache-installation: true

      - name: Activate Unity Personal license
        uses: buildalon/activate-unity-license@v2
        with:
          license: "Personal"
          username: ${{ secrets.UNITY_USERNAME }}
          password: ${{ secrets.UNITY_PASSWORD }}

      - name: Build shaders.linux (HullcamVDS)
        working-directory: hullcam/HullCameraAssets
        run: |
          "$UNITY_EDITOR_PATH" \
            -batchmode -nographics -quit \
            -projectPath "$(pwd)" \
            -executeMethod KerbcastCI.BuildShaderBundle.BuildLinux \
            -buildTarget Linux64 \
            -logFile -
          cp Bundles-linux/shaders shaders.linux

      - name: Build kerbcast-shaders (linux, osx)
        working-directory: ci/kerbcast-shaders
        run: |
          "$UNITY_EDITOR_PATH" \
            -batchmode -nographics -quit \
            -projectPath "$(pwd)" \
            -executeMethod KerbcastCI.BuildKerbcastShaders.BuildUnix \
            -buildTarget Linux64 \
            -logFile -

      # The Windows bundle is built (and d3d11-smoke-tested) by the
      # build-windows-shaders job; collect it for the assemble step.
      - name: Download Windows shader bundle artifact
        uses: actions/download-artifact@v8
        with:
          name: kerbcast-shaders-windows
          path: windows-shaders

      - name: Assemble GameData/Kerbcast
        run: |
          set -euo pipefail
          mkdir -p \
            GameData/Kerbcast/Plugins \
            GameData/Kerbcast/Sidecar \
            GameData/Kerbcast/HullcamShaders

          cp Plugin/obj/Release/Kerbcast.dll GameData/Kerbcast/Plugins/

          # Per-rid sidecar layout: Sidecar/<rid>/kerbcast-sidecar[.exe] (+ lib/
          # on Linux). Kept in lockstep with ResolveSidecarBinary's rid switch
          # in Plugin/Kerbcast/KerbcastCore.cs. Each artifact dir already holds
          # the staged contents, so a plain recursive copy reproduces the tree.
          #
          # Every supported rid must be present — kerbcast ships for all OSes or
          # not at all. A failed sidecar build already blocks this job (bundle
          # needs build-sidecar), so a missing artifact here means a build
          # succeeded but produced nothing; refuse to cut a partial release.
          for rid in linux-x64 osx-arm64 win-x64; do
            src="sidecar-artifacts/kerbcast-sidecar-${rid}"
            if [ ! -d "$src" ]; then
              echo "::error::missing ${rid} sidecar artifact — refusing to cut a release that omits an OS"
              exit 1
            fi
            mkdir -p "GameData/Kerbcast/Sidecar/${rid}"
            cp -R "$src"/. "GameData/Kerbcast/Sidecar/${rid}/"
          done
          # Executable bits don't survive the artifact zip round-trip; restore
          # them so the plugin can ProcessStartInfo the binaries directly. Both
          # are guaranteed present by the loop above (Windows .exe needs no bit).
          chmod +x GameData/Kerbcast/Sidecar/linux-x64/kerbcast-sidecar
          chmod +x GameData/Kerbcast/Sidecar/osx-arm64/kerbcast-sidecar

          cp hullcam/HullCameraAssets/shaders.linux GameData/Kerbcast/HullcamShaders/
          # Linux keeps the legacy unsuffixed name (pre-multi-platform installs
          # and the loader's fallback both expect it); Windows/macOS get
          # platform suffixes per the HullcamShaders/shaders.linux precedent.
          cp ci/kerbcast-shaders/Bundles-linux/kerbcast-shaders GameData/Kerbcast/
          cp windows-shaders/kerbcast-shaders GameData/Kerbcast/kerbcast-shaders.windows
          cp ci/kerbcast-shaders/Bundles-osx/kerbcast-shaders GameData/Kerbcast/kerbcast-shaders.osx

          cp Plugin/settings.cfg GameData/Kerbcast/

          # kerbcast's own license (CC BY-NC-SA 4.0). The GPL-3.0 notice for the
          # Hullcam-derived shader bundle and the KSP-AVC Kerbcast.version manifest
          # are committed under GameData/Kerbcast/ and travel via the checkout.
          cp LICENSE GameData/Kerbcast/LICENSE

          echo "GameData/Kerbcast tree:"
          find GameData/Kerbcast -type f | sort

      - name: Create release zip
        run: |
          TAG="${GITHUB_REF_NAME}"
          zip -r "kerbcast-${TAG}.zip" GameData/
          echo "RELEASE_ZIP=kerbcast-${TAG}.zip" >> $GITHUB_ENV

      # No GITHUB_REPO env: cliff.toml uses only local commit data, and
      # setting it makes git-cliff fetch remote metadata it never renders —
      # a transient GitHub API 500 once killed a release at this step.
      # continue-on-error because a missing changelog must not block a
      # release after the expensive Unity builds; the notes fall back to a
      # plain git log below.
      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        id: git-cliff
        continue-on-error: true
        with:
          config: cliff.toml
          args: --latest --strip all

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CLIFF_CHANGELOG: ${{ steps.git-cliff.outputs.content }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [ -z "${CLIFF_CHANGELOG}" ]; then
            PREV_TAG="$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || true)"
            CLIFF_CHANGELOG="$(git log --oneline ${PREV_TAG:+${PREV_TAG}..}${TAG})"
          fi
          {
            echo "## Installation"
            echo ""
            echo "1. Extract \`kerbcast-${TAG}.zip\` into your KSP \`GameData/\` directory."
            echo "2. Install Hullcam VDS Continued (required)."
            echo "3. Start KSP and launch a flight with onboard camera parts."
            echo "4. Go to <ksp-ip>:<port> (configured in settings.cfg) to connect to streams."
            echo ""
            echo "## Assets"
            echo "- \`kerbcast-${TAG}.zip\` — complete install tree (plugin + sidecar + shader bundles + settings)"
            echo "- \`Kerbcast.dll\` — plugin DLL only (for manual installs)"
            echo ""
            echo "> TypeScript SDK \`@ksp-gonogo/kerbcast@${TAG#v}\` and \`@ksp-gonogo/kerbcast-react@${TAG#v}\` published to npm."
            echo ""
            echo "<details>"
            echo "<summary>Changelog</summary>"
            echo ""
            echo "${CLIFF_CHANGELOG}"
            echo ""
            echo "</details>"
          } > release-notes.md
          gh release create "${TAG}" \
            "${{ env.RELEASE_ZIP }}" \
            Plugin/obj/Release/Kerbcast.dll \
            --title "kerbcast ${TAG}" \
            --notes-file release-notes.md

      # Mirror the release onto SpaceDock so its version list (and the CKAN
      # entry that indexes off SpaceDock) tracks GitHub automatically.
      # SpaceDock has no API tokens; auth is cookie-based, so the credentials
      # live in repo secrets and the mod id in a repo variable. The step skips
      # cleanly until all three are configured. Runs on the tag, before the
      # ckan re-pin switches the working tree to main, so the assembled zip and
      # Kerbcast.version are still on disk.
      - name: Publish to SpaceDock
        if: startsWith(github.ref_name, 'v')
        env:
          SPACEDOCK_USERNAME: ${{ secrets.SPACEDOCK_USERNAME }}
          SPACEDOCK_PASSWORD: ${{ secrets.SPACEDOCK_PASSWORD }}
          SPACEDOCK_MOD_ID: ${{ vars.SPACEDOCK_MOD_ID }}
          CLIFF_CHANGELOG: ${{ steps.git-cliff.outputs.content }}
        run: |
          set -euo pipefail
          if [ -z "${SPACEDOCK_USERNAME:-}" ] || [ -z "${SPACEDOCK_PASSWORD:-}" ] || [ -z "${SPACEDOCK_MOD_ID:-}" ]; then
            echo "::warning::SpaceDock not configured (need secrets SPACEDOCK_USERNAME, SPACEDOCK_PASSWORD and variable SPACEDOCK_MOD_ID); skipping upload"
            exit 0
          fi
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          ZIP="${{ env.RELEASE_ZIP }}"
          GAME_VERSION="$(python3 -c "import json; v=json.load(open('GameData/Kerbcast/Kerbcast.version'))['KSP_VERSION']; print(f\"{v['MAJOR']}.{v['MINOR']}.{v['PATCH']}\")")"
          CHANGELOG="${CLIFF_CHANGELOG}"
          if [ -z "$CHANGELOG" ]; then
            PREV_TAG="$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || true)"
            CHANGELOG="$(git log --oneline ${PREV_TAG:+${PREV_TAG}..}${TAG})"
          fi
          printf '%s\n' "$CHANGELOG" > sd-changelog.md

          # 1) cookie login (SpaceDock has no API tokens)
          login="$(curl -sS -F username="$SPACEDOCK_USERNAME" -F password="$SPACEDOCK_PASSWORD" -c ./sd-cookies https://spacedock.info/api/login)"
          if printf '%s' "$login" | grep -q '"error"[[:space:]]*:[[:space:]]*true'; then
            echo "::error::SpaceDock login failed: $login"; exit 1
          fi
          # 2) upload the new version (multipart)
          resp="$(curl -sS -b ./sd-cookies \
            -F version="$VERSION" \
            -F "changelog=<sd-changelog.md" \
            -F game-version="$GAME_VERSION" \
            -F notify-followers=yes \
            -F zipball=@"$ZIP" \
            "https://spacedock.info/api/mod/${SPACEDOCK_MOD_ID}/update")"
          if printf '%s' "$resp" | grep -q '"error"[[:space:]]*:[[:space:]]*true'; then
            echo "::error::SpaceDock upload failed: $resp"; exit 1
          fi
          rm -f ./sd-cookies sd-changelog.md
          echo "SpaceDock mod ${SPACEDOCK_MOD_ID} updated to ${VERSION} (KSP ${GAME_VERSION})"

      # Kerbcast.ckan pins an exact version + download URL + hashes for manual
      # .ckan-file installs. The public NetKAN index resolves independently
      # via the SpaceDock listing (see the "Publish to SpaceDock" step above),
      # so this file isn't what CKAN users actually install from, but it goes
      # stale fast if left unpinned (went stale within a day of v0.18.0), so
      # re-pin from the zip we just published. Runs on main, not the tag: the
      # pin must land where users fetch the raw file from.
      - name: Re-pin Kerbcast.ckan on main
        if: startsWith(github.ref_name, 'v')
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          ZIP="${{ env.RELEASE_ZIP }}"
          SIZE="$(stat -c%s "$ZIP")"
          SHA1="$(sha1sum "$ZIP" | awk '{print toupper($1)}')"
          SHA256="$(sha256sum "$ZIP" | awk '{print toupper($1)}')"

          git fetch origin main
          # The assemble step overwrites tracked files (built shader bundles)
          # in the working tree; nothing there is needed anymore, discard.
          git checkout -f -B main origin/main

          python3 - "$TAG" "$SIZE" "$SHA1" "$SHA256" <<'EOF'
          import json
          import sys
          tag, size, sha1, sha256 = sys.argv[1:5]
          path = "Kerbcast.ckan"
          with open(path) as f:
              m = json.load(f)
          m["version"] = tag.lstrip("v")
          m["download"] = [
              f"https://github.com/ksp-gonogo/kerbcast/releases/download/{tag}/kerbcast-{tag}.zip"
          ]
          m["download_size"] = int(size)
          m["download_hash"] = {"sha1": sha1, "sha256": sha256}
          with open(path, "w") as f:
              json.dump(m, f, indent=4)
              f.write("\n")
          EOF

          if git diff --quiet Kerbcast.ckan; then
            echo "Kerbcast.ckan already pins ${TAG}; nothing to do"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Kerbcast.ckan
          git commit -m "chore(ckan): pin ${TAG}"
          git push origin main
