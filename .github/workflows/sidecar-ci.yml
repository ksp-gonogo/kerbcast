name: sidecar-ci

# Sidecar-only CI for now. Plugin and integration-harness pipelines land in
# separate workflow files when those targets come online.
#
# Validates: cargo fmt, cargo clippy, cargo test on every push to main and
# every PR that touches sidecar/ or this workflow. Runs on ubuntu-latest
# (tier-1 Linux) — macOS and Windows runners get added when their backends
# are non-stubs and warrant the CI minutes.

on:
  push:
    # wip/** covers active long-running branches (libva, throttle,
    # future hardware-encoder + render experiments) so each push
    # builds a sidecar artifact we can pull via gonogo_claude_tools.sh
    # without needing to dispatch manually. Path filter still gates
    # so plugin-only commits don't burn CI minutes; consumers of a
    # plugin-only branch should download main's artifact instead.
    branches:
      - main
      - 'wip/**'
    paths:
      - 'sidecar/**'
      - '.github/workflows/sidecar-ci.yml'
  pull_request:
    paths:
      - 'sidecar/**'
      - '.github/workflows/sidecar-ci.yml'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  check:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sidecar
    steps:
      - uses: actions/checkout@v6

      # System deps for the tier-1 libva backend via ffmpeg-next.
      # - libavcodec/util/format/swscale/avfilter-dev: pkg-config probes
      #   the libav* shared libs at build time. libavcodec-dev is the
      #   load-bearing one for h264_vaapi; the others are pulled in by
      #   ffmpeg-next's default codec module surface.
      # - libva-dev: required for h264_vaapi to actually register as a
      #   codec in the libavcodec build; without it the build still
      #   succeeds but the codec is missing at runtime.
      # - libclang-dev + pkg-config: bindgen / pkg-config used by
      #   ffmpeg-sys-next's build script.
      - name: Install ffmpeg + VA-API system libs
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            clang \
            libclang-dev \
            libavcodec-dev \
            libavutil-dev \
            libavformat-dev \
            libavfilter-dev \
            libswscale-dev \
            libva-dev

      - name: Install stable Rust + components
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry + target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            sidecar/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('sidecar/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: cargo fmt --check
        run: cargo fmt --check

      - name: cargo clippy
        # -D warnings makes clippy advisories CI failures. Tighten or loosen
        # by editing the explicit allow-list below as we hit real lints.
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --all-targets

      # Dev artefact only — not a release. Drops the linux-x64 binary so
      # contributors on non-Linux dev machines (e.g. Apple Silicon, where
      # QEMU's x86_64 emulation segfaults modern rustc binaries) can
      # download a working sidecar instead of cross-compiling locally.
      # The release pipeline is its own workflow once we cut tags.
      - name: cargo build --release
        run: cargo build --release

      # Bundle the ffmpeg shared libraries the sidecar links against so the
      # deployed artefact is self-contained on any Linux. SteamOS doesn't
      # ship libavutil.so.58 / libavcodec.so.60 / etc., and the binary
      # resolves every ffmpeg symbol at exec time — without bundling, the
      # dynamic linker fails before is_available()'s software-fallback path
      # can run, and the sidecar dies with exit 127.
      #
      # We bundle libav* / libsw* / libpostproc* (the ffmpeg-next link set)
      # but DELIBERATELY do NOT bundle libva itself. libva is a thin shim
      # that dlopen()s GPU-driver .so's (iHD_drv_video, i965_drv_video,
      # radeonsi_drv_video) matched to the host's kernel+Mesa stack;
      # bundling Ubuntu's libva on the Deck risks ABI mismatch with the
      # Deck's drivers. The Deck has its own libva already (Mesa needs it),
      # so we let LD_LIBRARY_PATH fall through to the system copy for it.
      - name: Stage sidecar + bundled shared libs
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          mkdir -p staging/lib
          cp sidecar/target/release/kerbcam-sidecar staging/

          # Resolve every libav* / libsw* / libpostproc* the binary links
          # against. ldd's second column is the resolved system path; copy
          # the file (not the symlink) so the artefact is portable, then
          # lay it down under the SONAME basename the binary asks for.
          deps="$(ldd staging/kerbcam-sidecar \
            | awk '/=>/ {print $3}' \
            | grep -E '/(libav|libsw|libpostproc)' \
            || true)"
          if [ -z "$deps" ]; then
            echo "::error::ldd found no libav*/libsw*/libpostproc* deps — refusing to upload a non-self-contained artefact"
            ldd staging/kerbcam-sidecar
            exit 1
          fi
          echo "Bundling:"
          echo "$deps"
          while IFS= read -r src; do
            [ -z "$src" ] && continue
            # Resolve to the real file (libavutil.so.58 -> libavutil.so.58.x.y)
            # but place it under the SONAME basename the binary asks for.
            # Keeps the lib/ dir flat and symlink-free so `gh run download`
            # round-trips cleanly (artifact zip doesn't preserve symlinks).
            real="$(readlink -f "$src")"
            soname="$(basename "$src")"
            cp "$real" "staging/lib/$soname"
          done <<< "$deps"

          echo "Bundled lib/ contents:"
          ls -la staging/lib/
          echo "Bundled size:"
          du -sh staging/lib/

      - name: Upload dev sidecar bundle
        uses: actions/upload-artifact@v7
        with:
          name: kerbcam-sidecar-linux-x64-dev
          # Uploading the staging directory preserves the layout
          # (kerbcam-sidecar + lib/) when consumers `gh run download -n`.
          path: staging
          if-no-files-found: error
