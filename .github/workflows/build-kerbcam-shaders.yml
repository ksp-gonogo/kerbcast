name: build-kerbcam-shaders

# Builds the kerbcam-shaders AssetBundle for Linux, Windows and macOS using
# Unity 2019.4 LTS, matching KSP 1.12.5's engine version. Shader variants are
# compiled per build target, so each platform needs its own bundle file.
# Output ships alongside the plugin as GameData/Kerbcam/kerbcam-shaders
# (Linux keeps the legacy unsuffixed name so existing installs are untouched)
# plus kerbcam-shaders.windows and kerbcam-shaders.osx, following the
# HullcamShaders/shaders.linux platform-suffix precedent.
#
# Runner split: the Linux job builds the Linux + macOS bundles; the Windows
# bundle builds on a windows-2022 runner. It used to cross-compile on the
# Linux editor (Hub windows-mono module), but the 2019.4 Linux toolchain
# emitted d3d11 vertex shader blobs the Windows D3D11 runtime rejects at
# draw time with E_INVALIDARG (0x80070057) while shader.isSupported stayed
# true. Field result in v0.19.0: every kerbcam-bundle camera (NightVision
# class) streamed black and KSP.log filled with 470k "ShaderProgram is
# unsupported" lines. Building on a real Windows editor uses the real
# Windows shader compiler, and the smoke test there executes the d3d11
# blobs on the runner's WARP rasterizer, where Create*Shader validates the
# bytecode the Linux run never could. The macOS metal cross-compile from
# Linux carries the same theoretical risk; macOS is tier-2, has no field
# failure, and the plugin's KerbcamFxAssets render probe degrades a bad
# bundle gracefully at runtime, so it stays on the Linux job for now.
#
# Blocking checks: bundle builds, a per-shader render smoke test on each
# just-built bundle (glcore for Linux, d3d11 for Windows), and the Hullcam
# blit determinism test. The slow FX preview rendering lives in the
# non-blocking fx-previews.yml workflow, which runs after this one succeeds.
#
# Auth: uses buildalon/activate-unity-license@v2 with UNITY_USERNAME +
# UNITY_PASSWORD repo secrets. Same pattern as build-hullcam-shaders.yml.
# build-windows needs:builds-unix partly for fail-fast, partly so the two
# jobs never hold the Unity Personal license concurrently.
#
# Trigger: manual via workflow_dispatch, and on push to the shader sources
# or this workflow file.

on:
  push:
    paths:
      - 'ci/kerbcam-shaders/**'
      # Shared sources the Unity project compiles via Assets/Editor symlinks,
      # and the committed Hullcam shader bundle the determinism test loads.
      - 'Plugin/Kerbcam/Fx/Core/**'
      - 'Plugin/Kerbcam/HullcamBlit/**'
      - 'GameData/Kerbcam/HullcamShaders/**'
      - '.github/workflows/build-kerbcam-shaders.yml'
  workflow_dispatch:

permissions:
  contents: read

env:
  UNITY_VERSION: 2019.4.40f1 (ffc62b691db5)

jobs:
  build-unix:
    name: Build Linux + macOS shader bundles
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Unity Hub + Editor
        uses: buildalon/unity-setup@v2
        with:
          unity-version: ${{ env.UNITY_VERSION }}
          version-file: 'None'
          # mac-mono lets the Linux editor compile the metal variants for the
          # macOS bundle. The Windows bundle builds on its own runner (see
          # the header), so windows-mono is no longer installed here.
          build-targets: StandaloneLinux64
          modules: mac-mono
          cache-installation: true

      - name: Activate Unity Personal license
        uses: buildalon/activate-unity-license@v2
        with:
          license: 'Personal'
          username: ${{ secrets.UNITY_USERNAME }}
          password: ${{ secrets.UNITY_PASSWORD }}

      - name: Build kerbcam-shaders AssetBundles (linux, osx)
        working-directory: ci/kerbcam-shaders
        run: |
          "$UNITY_EDITOR_PATH" \
            -batchmode -nographics -quit \
            -projectPath "$(pwd)" \
            -executeMethod KerbcamCI.BuildKerbcamShaders.BuildUnix \
            -buildTarget Linux64 \
            -logFile -
          echo "--- output bundles ---"
          ls -la Bundles-linux/ Bundles-osx/

      # Both render tests below need a real graphics device: `-nographics`
      # disables it entirely, turning Camera.Render(), Graphics.Blit and
      # RenderTexture readback into no-ops. xvfb gives the runner a virtual
      # display for the GL context.
      - name: Install xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb

      # Per-shader render smoke test on the just-built Linux bundle: every
      # shader in it must report isSupported, render through a material onto
      # a small deterministic scene, and produce output that is neither the
      # magenta error pattern nor all-zero. This run executes the glcore
      # variants ONLY; it cannot validate the d3d11 blobs in the Windows
      # bundle (see the build-windows job). Judging how the FX actually LOOK
      # stays with the fx-previews.yml renders.
      - name: Shader render smoke test (Linux bundle, glcore)
        working-directory: ci/kerbcam-shaders
        timeout-minutes: 10
        run: |
          xvfb-run -a "$UNITY_EDITOR_PATH" \
            -batchmode -quit \
            -projectPath "$(pwd)" \
            -executeMethod KerbcamCI.ShaderSmoke.RenderAll \
            -buildTarget Linux64 \
            -logFile -

      # Regression net for the per-camera Hullcam filter blit (c00fe16):
      # compiles the plugin's HullcamFilterBlit.cs verbatim (via the
      # Assets/Editor/SharedHullcamBlit symlink), loads the committed
      # GameData/Kerbcam/HullcamShaders/shaders.linux MovieTime shader, and
      # asserts each filter mode's blit output is byte-identical under
      # hostile writes to the shared static material (plus reticle on/off
      # policy vs a no-title baseline, plus a control that the legacy
      # shared-static path visibly flickers). Same xvfb arrangement as the
      # smoke test: -nographics would no-op Graphics.Blit and ReadPixels.
      - name: Hullcam filter blit determinism test
        working-directory: ci/kerbcam-shaders
        timeout-minutes: 10
        run: |
          xvfb-run -a "$UNITY_EDITOR_PATH" \
            -batchmode -quit \
            -projectPath "$(pwd)" \
            -executeMethod KerbcamCI.HullcamBlitDeterminism.RunAll \
            -buildTarget Linux64 \
            -logFile -

      - uses: actions/upload-artifact@v4
        with:
          name: kerbcam-shaders-unix
          path: |
            ci/kerbcam-shaders/Bundles-linux/kerbcam-shaders
            ci/kerbcam-shaders/Bundles-osx/kerbcam-shaders
          if-no-files-found: error
          retention-days: 30

  build-windows:
    name: Build Windows shader bundle
    # Fail-fast on broken shader sources (the unix job is quicker to start)
    # and keep the single Unity Personal license from being activated by two
    # runners at once.
    needs: build-unix
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - name: Set up Unity Hub + Editor
        uses: buildalon/unity-setup@v2
        with:
          unity-version: ${{ env.UNITY_VERSION }}
          version-file: 'None'
          build-targets: StandaloneWindows64
          # NOT cached: a cache-restored Windows Unity install exits
          # instantly without writing a log (installer/registry state is
          # not in the cached directory; run 27330133502 vs the fresh
          # install that passed). Fresh install costs ~10 min per run.
          cache-installation: false

      - name: Activate Unity Personal license
        uses: buildalon/activate-unity-license@v2
        with:
          license: 'Personal'
          username: ${{ secrets.UNITY_USERNAME }}
          password: ${{ secrets.UNITY_PASSWORD }}

      # Native Windows shader compiler: the whole point of this job. The
      # Linux editor's d3d11 cross-compile shipped invalid vertex shader
      # blobs in v0.19.0 (see the workflow header).
      - name: Build kerbcam-shaders AssetBundle (windows)
        working-directory: ci/kerbcam-shaders
        shell: bash
        run: |
          status=0
          "$UNITY_EDITOR_PATH" \
            -batchmode -nographics -quit \
            -projectPath "$(pwd)" \
            -executeMethod KerbcamCI.BuildKerbcamShaders.BuildWindows \
            -buildTarget Win64 \
            -logFile unity-build.log || status=$?
          cat unity-build.log 2>/dev/null || echo "::error::Unity wrote no log (exit $status): editor launch failed before logging"
          [ "$status" -eq 0 ] || exit "$status"
          echo "--- output bundles ---"
          ls -la Bundles-windows/

      # The same per-shader smoke test the Linux job runs, but on the d3d11
      # variants with a real D3D11 device (the hosted runner's WARP software
      # rasterizer). D3D11 validates shader bytecode inside Create*Shader,
      # so the invalid-blob class that black-screened v0.19.0 fails HERE
      # instead of on a player's machine. No xvfb needed on Windows; just
      # batchmode WITHOUT -nographics so a device exists.
      - name: Shader render smoke test (Windows bundle, d3d11)
        working-directory: ci/kerbcam-shaders
        timeout-minutes: 10
        shell: bash
        env:
          KERBCAM_SMOKE_BUNDLE_DIR: Bundles-windows
        run: |
          status=0
          "$UNITY_EDITOR_PATH" \
            -batchmode -quit \
            -projectPath "$(pwd)" \
            -executeMethod KerbcamCI.ShaderSmoke.RenderAll \
            -buildTarget Win64 \
            -logFile unity-smoke.log || status=$?
          cat unity-smoke.log 2>/dev/null || echo "::error::Unity wrote no log (exit $status): editor launch failed before logging"
          exit "$status"

      - uses: actions/upload-artifact@v4
        with:
          name: kerbcam-shaders-windows
          path: ci/kerbcam-shaders/Bundles-windows/kerbcam-shaders
          if-no-files-found: error
          retention-days: 30

  # Merge the per-runner bundles into the single kerbcam-shaders artifact
  # downstream consumers (deck-deploy staging, manual installs) expect, laid
  # out exactly as they land in GameData/Kerbcam/.
  assemble:
    name: Assemble kerbcam-shaders artifact
    needs: [build-unix, build-windows]
    runs-on: ubuntu-22.04
    steps:
      - name: Download per-runner bundles
        uses: actions/download-artifact@v4
        with:
          path: bundles

      - name: Lay out GameData/Kerbcam
        run: |
          set -euo pipefail
          mkdir -p GameData/Kerbcam
          cp bundles/kerbcam-shaders-unix/Bundles-linux/kerbcam-shaders GameData/Kerbcam/kerbcam-shaders
          cp bundles/kerbcam-shaders-unix/Bundles-osx/kerbcam-shaders GameData/Kerbcam/kerbcam-shaders.osx
          cp bundles/kerbcam-shaders-windows/kerbcam-shaders GameData/Kerbcam/kerbcam-shaders.windows
          ls -la GameData/Kerbcam/

      - uses: actions/upload-artifact@v4
        with:
          name: kerbcam-shaders
          path: |
            GameData/Kerbcam/kerbcam-shaders
            GameData/Kerbcam/kerbcam-shaders.windows
            GameData/Kerbcam/kerbcam-shaders.osx
          if-no-files-found: error
          retention-days: 30
