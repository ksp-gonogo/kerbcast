name: build-kerbcam-shaders

# Builds the kerbcam-shaders AssetBundle for Linux, Windows and macOS using
# Unity 2019.4 LTS, matching KSP 1.12.5's engine version. Shader variants are
# compiled per build target, so each platform needs its own bundle file.
# Output ships alongside the plugin as GameData/Kerbcam/kerbcam-shaders
# (Linux keeps the legacy unsuffixed name so existing installs are untouched)
# plus kerbcam-shaders.windows and kerbcam-shaders.osx, following the
# HullcamShaders/shaders.linux platform-suffix precedent.
#
# Auth: uses buildalon/activate-unity-license@v2 with UNITY_USERNAME +
# UNITY_PASSWORD repo secrets. Same pattern as build-hullcam-shaders.yml.
#
# Trigger: manual via workflow_dispatch, and on push to the shader sources
# or this workflow file.

on:
  push:
    paths:
      - 'ci/kerbcam-shaders/**'
      # Shared sources the Unity project compiles via Assets/Editor symlinks,
      # and the committed Hullcam shader bundle the determinism test loads.
      - 'Plugin/Kerbcam/Fx/Core/**'
      - 'Plugin/Kerbcam/HullcamBlit/**'
      - 'GameData/Kerbcam/HullcamShaders/**'
      - '.github/workflows/build-kerbcam-shaders.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build kerbcam shader bundles
    runs-on: ubuntu-22.04

    env:
      UNITY_VERSION: 2019.4.40f1 (ffc62b691db5)

    steps:
      - uses: actions/checkout@v4

      - name: Set up Unity Hub + Editor
        uses: buildalon/unity-setup@v2
        with:
          unity-version: ${{ env.UNITY_VERSION }}
          version-file: 'None'
          # Windows/macOS player-support modules let the Linux editor compile
          # d3d11/metal shader variants; no Windows or mac runner needed.
          # They must be requested as Hub module ids via `modules` — the
          # action rejects non-host build-targets on Linux ("StandaloneWindows64
          # is not a valid build target for Linux", run 27307004282).
          build-targets: StandaloneLinux64
          modules: windows-mono mac-mono
          cache-installation: true

      - name: Activate Unity Personal license
        uses: buildalon/activate-unity-license@v2
        with:
          license: 'Personal'
          username: ${{ secrets.UNITY_USERNAME }}
          password: ${{ secrets.UNITY_PASSWORD }}

      - name: Build kerbcam-shaders AssetBundles
        working-directory: ci/kerbcam-shaders
        run: |
          "$UNITY_EDITOR_PATH" \
            -batchmode -nographics -quit \
            -projectPath "$(pwd)" \
            -executeMethod KerbcamCI.BuildKerbcamShaders.BuildAll \
            -buildTarget Linux64 \
            -logFile -
          echo "--- output bundles ---"
          ls -la Bundles-linux/ Bundles-windows/ Bundles-osx/

      - name: Copy bundles into GameData
        run: |
          cp ci/kerbcam-shaders/Bundles-linux/kerbcam-shaders GameData/Kerbcam/kerbcam-shaders
          cp ci/kerbcam-shaders/Bundles-windows/kerbcam-shaders GameData/Kerbcam/kerbcam-shaders.windows
          cp ci/kerbcam-shaders/Bundles-osx/kerbcam-shaders GameData/Kerbcam/kerbcam-shaders.osx

      - uses: actions/upload-artifact@v4
        with:
          name: kerbcam-shaders
          path: |
            GameData/Kerbcam/kerbcam-shaders
            GameData/Kerbcam/kerbcam-shaders.windows
            GameData/Kerbcam/kerbcam-shaders.osx
          retention-days: 30

      # Render FX preview PNGs from the fixtures in ci/kerbcam-shaders/Fixtures.
      # Each fixture sets up a proxy vessel + camera, applies KerbcamPlasma via
      # CommandBuffer at AfterForwardAlpha (same hook as runtime), then renders
      # one frame to PNG. Output PNGs become a CI artifact so we can iterate on
      # the shader without flying KSP. See RenderFxPreviews.cs for the full
      # description; placeholder fixtures live alongside it.
      #
      # `-nographics` is intentionally OMITTED here: the flag disables Unity's
      # graphics device entirely, which would make Camera.Render() and
      # RenderTexture readback no-ops. We wrap in `xvfb-run` so the runner has
      # a (virtual) display for the GL context.
      - name: Install xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Render FX preview PNGs
        working-directory: ci/kerbcam-shaders
        # LLVMpipe fill cost scales with proxy triangle count (one strip per
        # windward triangle, strip area independent of triangle size). With
        # the real-part-density nose cone the full fixture × shader × view
        # matrix takes several minutes; 15 min still fails reasonably fast on
        # a genuine LLVMpipe hang without killing healthy renders.
        timeout-minutes: 15
        run: |
          xvfb-run -a "$UNITY_EDITOR_PATH" \
            -batchmode -quit \
            -projectPath "$(pwd)" \
            -executeMethod KerbcamCI.RenderFxPreviews.RenderAll \
            -buildTarget Linux64 \
            -logFile -
          echo "--- preview PNGs ---"
          ls -la Previews/ || true

      # always() so a hung/failed render still uploads everything rendered
      # before it — a partial artifact beats losing the whole review cycle.
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: fx-previews
          path: ci/kerbcam-shaders/Previews/
          retention-days: 30
          if-no-files-found: warn

      # Regression net for the per-camera Hullcam filter blit (c00fe16):
      # compiles the plugin's HullcamFilterBlit.cs verbatim (via the
      # Assets/Editor/SharedHullcamBlit symlink), loads the committed
      # GameData/Kerbcam/HullcamShaders/shaders.linux MovieTime shader, and
      # asserts each filter mode's blit output is byte-identical under
      # hostile writes to the shared static material (plus reticle on/off
      # policy vs a no-title baseline, plus a control that the legacy
      # shared-static path visibly flickers). Same xvfb arrangement as the
      # FX previews: -nographics would no-op Graphics.Blit and ReadPixels.
      - name: Hullcam filter blit determinism test
        working-directory: ci/kerbcam-shaders
        timeout-minutes: 10
        run: |
          xvfb-run -a "$UNITY_EDITOR_PATH" \
            -batchmode -quit \
            -projectPath "$(pwd)" \
            -executeMethod KerbcamCI.HullcamBlitDeterminism.RunAll \
            -buildTarget Linux64 \
            -logFile -
