name: protocol-ci

# CI regenerates types.ts authoritatively from the Rust protocol on every
# run; the committed types.ts is a developer convenience only, not a CI gate.
# On push to main, any change is auto-committed back. On PRs, the regenerated
# file is uploaded as an artifact so reviewers can inspect the impact of a
# Rust protocol change without a manual regen step.

on:
  push:
    branches: [main]
    paths:
      - 'sidecar/src/protocol/**'
      - 'sidecar/Cargo.toml'
      - 'client-sdk/typescript/**'
      - 'client-sdk/react/**'
      - 'pnpm-workspace.yaml'
      - 'pnpm-lock.yaml'
      - '.github/workflows/protocol-ci.yml'
  pull_request:
    paths:
      - 'sidecar/src/protocol/**'
      - 'sidecar/Cargo.toml'
      - 'client-sdk/typescript/**'
      - 'client-sdk/react/**'
      - 'pnpm-workspace.yaml'
      - 'pnpm-lock.yaml'
      - '.github/workflows/protocol-ci.yml'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  drift-check:
    name: typeshare regen + tsc build + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + typeshare binary
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin/typeshare
          key: ${{ runner.os }}-typeshare-cli-1.13.4

      - name: Install typeshare-cli
        run: |
          if ! command -v typeshare >/dev/null 2>&1; then
            cargo install typeshare-cli --version 1.13.4 --locked
          fi
          typeshare --version

      - name: Regenerate TS bindings
        run: |
          typeshare ./sidecar/src \
            --lang=typescript \
            --output-file=client-sdk/typescript/src/__generated__/types.ts

      - name: Auto-commit regenerated types (push to main only)
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add client-sdk/typescript/src/__generated__/types.ts
          git diff --staged --quiet || git commit -m "chore: regenerate typeshare bindings [skip ci]"
          git push

      - name: Verify version sync (Cargo.toml == typescript package.json)
        run: |
          PKG_VER="$(node -p "require('./client-sdk/typescript/package.json').version")"
          CARGO_VER="$(grep -m1 '^version = ' sidecar/Cargo.toml | sed -E 's/version = "(.*)"/\1/')"
          echo "cargo=$CARGO_VER package=$PKG_VER"
          if [ "$CARGO_VER" != "$PKG_VER" ]; then
            echo "::error::version mismatch: Cargo.toml ($CARGO_VER) vs package.json ($PKG_VER). Run ./scripts/bump-version.sh."
            exit 1
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install workspace dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build all packages
        run: pnpm -r build

      - name: Test all packages
        run: pnpm -r test

      - name: Upload built TS dist as dev artefact
        uses: actions/upload-artifact@v7
        with:
          name: kerbcam-protocol-typescript-dev
          path: |
            client-sdk/typescript/dist/
            client-sdk/typescript/src/index.ts
            client-sdk/typescript/package.json
            client-sdk/typescript/README.md
          if-no-files-found: error

      - name: Upload regenerated types (PR diff reference)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: regenerated-types
          path: client-sdk/typescript/src/__generated__/types.ts
          if-no-files-found: error
