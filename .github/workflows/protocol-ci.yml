name: protocol-ci

# Single source of truth for @kerbcam/protocol: Rust types in
# sidecar/src/protocol/, TS generated by typeshare into
# client-sdk/typescript/src/index.ts. This workflow catches the case
# where a contributor edits the Rust side but forgets to regenerate
# the TS — it runs typeshare and fails CI if the output differs from
# what's committed.
#
# Also tsc-compiles the package to surface type errors in the generated
# output (typeshare can produce valid-looking but tsc-rejected TS for
# some edge cases — better to catch in CI than at npm publish time).
#
# Stops short of automated `npm publish` — versioning and publishing
# stays manual until there's a real consumer pulling from the registry.

on:
  push:
    branches: [main]
    paths:
      - 'sidecar/src/protocol/**'
      - 'sidecar/Cargo.toml'
      - 'client-sdk/typescript/**'
      - '.github/workflows/protocol-ci.yml'
  pull_request:
    paths:
      - 'sidecar/src/protocol/**'
      - 'sidecar/Cargo.toml'
      - 'client-sdk/typescript/**'
      - '.github/workflows/protocol-ci.yml'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  drift-check:
    name: typeshare drift + tsc build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + typeshare binary
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin/typeshare
          key: ${{ runner.os }}-typeshare-cli-1.13.4

      - name: Install typeshare-cli
        run: |
          if ! command -v typeshare >/dev/null 2>&1; then
            cargo install typeshare-cli --version 1.13.4 --locked
          fi
          typeshare --version

      - name: Regenerate TS bindings
        run: |
          typeshare ./sidecar/src \
            --lang=typescript \
            --output-file=/tmp/regenerated.ts

      - name: Diff against committed bindings
        run: |
          if ! diff -u client-sdk/typescript/src/index.ts /tmp/regenerated.ts; then
            echo "::error::client-sdk/typescript/src/index.ts is out of sync with the Rust protocol types."
            echo "::error::Run \`typeshare ./sidecar/src --lang=typescript --output-file=client-sdk/typescript/src/index.ts\` and commit the result."
            exit 1
          fi

      - name: Verify version sync (Cargo.toml == package.json)
        run: |
          PKG_VER="$(node -p "require('./client-sdk/typescript/package.json').version")"
          CARGO_VER="$(grep -m1 '^version = ' sidecar/Cargo.toml | sed -E 's/version = "(.*)"/\1/')"
          echo "cargo=$CARGO_VER package=$PKG_VER"
          if [ "$CARGO_VER" != "$PKG_VER" ]; then
            echo "::error::version mismatch — Cargo.toml ($CARGO_VER) vs package.json ($PKG_VER). Run ./scripts/bump-version.sh."
            exit 1
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: client-sdk/typescript/pnpm-lock.yaml

      - name: Install + build TypeScript package
        working-directory: client-sdk/typescript
        run: |
          pnpm install --no-frozen-lockfile
          pnpm run build

      - name: Upload built TS dist as dev artefact
        uses: actions/upload-artifact@v4
        with:
          name: kerbcam-protocol-typescript-dev
          path: |
            client-sdk/typescript/dist/
            client-sdk/typescript/src/index.ts
            client-sdk/typescript/package.json
            client-sdk/typescript/README.md
          if-no-files-found: error
