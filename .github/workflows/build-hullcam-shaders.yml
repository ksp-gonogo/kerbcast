name: Build HullcamVDS shader bundle (Linux)

# Rebuilds HullcamVDSContinued's shader AssetBundle for Linux using a
# modern Unity 2019.4 LTS, working around the upstream bundle's broken
# state on Mesa OpenGL (GitHub issue
# linuxgurugamer/HullcamVDSContinued#27, open since 2021). The upstream
# CreateAssetBundles.cs targets the deprecated StandaloneLinuxUniversal
# enum which was removed in Unity 2019.2; our override at
# ci/hullcam-shaders/BuildShaderBundle.cs targets StandaloneLinux64.
#
# Output: a `shaders.linux` AssetBundle uploaded as a workflow artifact.
# Kerbcam picks it up at runtime via the Harmony patch in the plugin
# (see HullcamFilterIntegration.cs).
#
# Auth: uses buildalon/activate-unity-license@v2 with UNITY_USERNAME +
# UNITY_PASSWORD repo secrets. No 2FA assumed. If the Unity account
# later gets 2FA enabled, add UNITY_TOTP_KEY and pass via the action's
# `totp` input.
#
# Trigger: manual via workflow_dispatch (and on push to this workflow
# file or to ci/hullcam-shaders/) — keeps activation rate down on
# Unity's licensing servers while we iterate.

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/build-hullcam-shaders.yml'
      - 'ci/hullcam-shaders/**'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      # Unity 2019.4 LTS final release. AssetBundles built here are
      # cross-compatible with KSP 1.12.5 (runs 2019.4.18f1) across the
      # 2019.4.x patch range. If Unity Personal activation rejects this
      # patch (modern Named User Licensing has a floor circa .41), bump
      # to a known-higher patch. Bracketed hash is what Unity Hub uses
      # to disambiguate installs.
      UNITY_VERSION: 2019.4.40f1 (ffc62b691db5)
      # Pin HullcamVDSContinued to the current HEAD commit on master.
      # Bump as needed when upstream updates shader source. Keeping it
      # pinned (vs. tracking master) avoids surprise CI changes when
      # upstream commits land mid-iteration.
      HULLCAM_REPO: linuxgurugamer/HullcamVDSContinued
      HULLCAM_REF: master

    steps:
      - name: Checkout kerbcam (for our build override)
        uses: actions/checkout@v4
        with:
          path: kerbcam

      - name: Checkout HullcamVDSContinued (shader source)
        uses: actions/checkout@v4
        with:
          repository: ${{ env.HULLCAM_REPO }}
          ref: ${{ env.HULLCAM_REF }}
          path: hullcam

      - name: Drop our build script into the Unity asset project
        run: |
          # Replace upstream's CreateAssetBundles.cs with ours.
          # Upstream's script references BuildTarget.StandaloneOSXUniversal
          # and BuildTarget.StandaloneLinuxUniversal, both removed in
          # Unity 2019.2 — Unity will fail to compile the project even
          # if we never invoke their method. Our script targets only
          # StandaloneLinux64 with the modern enum.
          mkdir -p hullcam/HullCameraAssets/Assets/Editor
          rm -f hullcam/HullCameraAssets/Assets/Editor/CreateAssetBundles.cs
          cp kerbcam/ci/hullcam-shaders/BuildShaderBundle.cs \
             hullcam/HullCameraAssets/Assets/Editor/BuildShaderBundle.cs
          ls -la hullcam/HullCameraAssets/Assets/Editor/

      # Order matters: unity-setup installs Unity Hub + Editor first;
      # activate-unity-license then uses Hub's Licensing Client to
      # auth. Reversed order errors with "Unity Hub is not installed".
      - name: Set up Unity Hub + Editor
        uses: buildalon/unity-setup@v2
        with:
          unity-version: ${{ env.UNITY_VERSION }}
          # Skip auto-detection of ProjectVersion.txt in the cloned
          # HullCameraAssets/ — that file pins an ancient Unity version
          # which the action's resolver chokes on. We control the
          # version explicitly via unity-version above.
          version-file: 'None'
          build-targets: StandaloneLinux64
          cache-installation: true

      - name: Activate Unity Personal license
        uses: buildalon/activate-unity-license@v2
        with:
          license: 'Personal'
          username: ${{ secrets.UNITY_USERNAME }}
          password: ${{ secrets.UNITY_PASSWORD }}

      - name: Build shaders.linux AssetBundle
        working-directory: hullcam/HullCameraAssets
        run: |
          "$UNITY_EDITOR_PATH" \
            -batchmode -nographics -quit \
            -projectPath "$(pwd)" \
            -executeMethod KerbcamCI.BuildShaderBundle.BuildLinux \
            -buildTarget Linux64 \
            -logFile -
          echo "--- output bundle ---"
          ls -la Bundles-linux/

      - name: Rename + upload bundle artifact
        working-directory: hullcam/HullCameraAssets
        run: |
          # Unity names the output after the AssetBundle name set in
          # the project. The bundle of interest is `shaders`; copy +
          # rename to shaders.linux so kerbcam can ship it under
          # HullcamVDS' canonical filename if we want to.
          cp Bundles-linux/shaders shaders.linux

      - name: Upload shaders.linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: shaders.linux
          path: hullcam/HullCameraAssets/shaders.linux
          retention-days: 30
