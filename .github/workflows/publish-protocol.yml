name: publish-protocol

# Tag-triggered publish to GitHub Packages for @jonpepler/kerbcam and
# @jonpepler/kerbcam-react.
#
# GitHub Packages requires the npm scope to match the repo's owner;
# we use `@jonpepler` because that's where the repo lives today. If
# the project later moves to an umbrella org, the scope changes to
# that org's name in a single search-replace.
#
# Trigger: annotated tag matching `v*` (e.g. `v0.1.0`, `v1.2.3`).
# The version is treated as a single source of truth across all three
# halves of the wire contract:
#
#   - sidecar/Cargo.toml's `version = ...` (Rust)
#   - client-sdk/typescript/package.json's `version` (TypeScript)
#   - client-sdk/react/package.json's `version` (React)
#
# All four (tag, Cargo.toml, two package.json files) must agree or the
# workflow fails before publishing. `./scripts/bump-version.sh X.Y.Z`
# bumps all of them atomically.
#
# CI regenerates types fresh from Rust. No drift check; version sync
# check still gates publish.
#
# Publish strategy: `pnpm publish --no-git-checks` from each package
# directory. pnpm rewrites workspace:^ to real semver ranges in the
# published tarball. pnpm 9 does not support --provenance; provenance
# attestation is deferred until pnpm gains support or a pack+npm-publish
# wrapper is added. Core is published before react so the registry has
# the dependency when react is indexed.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: read
  # Required to publish to the repo's GitHub Packages registry.
  packages: write

jobs:
  publish:
    name: drift + version sync + tsc + GitHub Packages publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + typeshare binary
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin/typeshare
          key: ${{ runner.os }}-typeshare-cli-1.13.4

      - name: Install typeshare-cli
        run: |
          if ! command -v typeshare >/dev/null 2>&1; then
            cargo install typeshare-cli --version 1.13.4 --locked
          fi
          typeshare --version

      - name: Regenerate TS bindings
        run: |
          typeshare ./sidecar/src \
            --lang=typescript \
            --output-file=client-sdk/typescript/src/__generated__/types.ts

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node + GitHub Packages registry
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          registry-url: https://npm.pkg.github.com
          scope: '@jonpepler'

      - name: Verify version sync (tag == Cargo.toml == all package.json files)
        working-directory: ${{ github.workspace }}
        run: |
          TAG_VER="${GITHUB_REF_NAME#v}"
          PKG_VER="$(node -p "require('./client-sdk/typescript/package.json').version")"
          REACT_VER="$(node -p "require('./client-sdk/react/package.json').version")"
          CARGO_VER="$(grep -m1 '^version = ' sidecar/Cargo.toml | sed -E 's/version = "(.*)"/\1/')"
          echo "tag=$TAG_VER cargo=$CARGO_VER typescript=$PKG_VER react=$REACT_VER"
          if [ "$TAG_VER" != "$CARGO_VER" ] || [ "$CARGO_VER" != "$PKG_VER" ] || [ "$PKG_VER" != "$REACT_VER" ]; then
            echo "::error::version mismatch: run ./scripts/bump-version.sh $TAG_VER and re-tag"
            exit 1
          fi

      - name: Install workspace dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build all packages
        run: pnpm -r build

      - name: Publish @jonpepler/kerbcam to GitHub Packages
        working-directory: client-sdk/typescript
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm publish --no-git-checks

      - name: Publish @jonpepler/kerbcam-react to GitHub Packages
        working-directory: client-sdk/react
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm publish --no-git-checks
