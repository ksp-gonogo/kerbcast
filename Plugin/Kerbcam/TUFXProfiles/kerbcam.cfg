// Kerbcam-curated TUFX profile. Applied to kerbcam's per-camera
// PostProcessVolumes when TUFX is installed and settings.cfg's
// TUFXProfile == "kerbcam" (the default). Tuned for offboard
// camera-stream aesthetics — wide DR across Kerbin's atmospheric
// scattering, not in-game flight-view styling.

TUFX_PROFILE
{
    name = kerbcam
    hdr = True
    // SMAA, not TAA — TAA needs shared motion vectors that
    // offscreen-RT cameras don't have, smears the stream.
    antialiasing = SubpixelMorphologicalAntialiasing
    secondaryAntialiasing = None

    EFFECT
    {
        name = AmbientOcclusion
        Intensity = 0.5
    }
    EFFECT
    {
        name = AutoExposure
    }
    EFFECT
    {
        name = Bloom
        Intensity = 2.0
        Threshold = 0.95
        SoftKnee = 0.65
        Diffusion = 7
    }
    EFFECT
    {
        name = ColorGrading
        GradingMode = HighDefinitionRange
        Tonemapper = ACES
    }
}
