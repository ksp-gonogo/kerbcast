// kerbcam plugin settings. Loaded by KerbcamCore on Flight scene wake.
// Missing fields fall back to the defaults shown below — delete a line
// to revert it to default.
//
// BindAddress = 0.0.0.0 makes the sidecar reachable from any device on
// your LAN — the intended use case (stream to a browser / mission
// control screen on another machine). Lock it down to 127.0.0.1 if
// you want it localhost-only. The sidecar has no auth; treat the
// signalling endpoint as readable by anyone on your LAN.
//
// Per-camera overrides: add as many `Camera { ... }` blocks as you
// like. PartName matches KSP's internal part name (case-sensitive —
// you can find these by looking at part.cfg files in GameData, or via
// the [Kerbcam] tracking log lines). Layers takes a comma-separated
// subset of NEAR, SCALED, GALAXY (or the keyword ALL). An empty set
// falls back to ALL.
//
// Two examples are commented out below. Layer changes from the
// sidecar's POST /cameras/{id}/layers API override these at runtime.
Settings
{
  BindAddress = 0.0.0.0
  Port = 8088
  Width = 1024
  Height = 576
  AutoSpawnSidecar = true

  // When KSP fps drops, kerbcam degrades adaptively. By DEFAULT this is
  // *temporal*: capture staggering cuts how many cameras are captured per
  // frame as fps falls (full image quality, lower per-camera update rate).
  // EnableAdaptiveShed = true ALSO drops render resolution / FX layers
  // (a quality cascade) under load. Default false.
  // EnableAdaptiveShed = false
  //
  // Anti-flap tuning for the degrade level (all in seconds except the
  // factor). The defaults are unvalidated estimates — calibrate on your
  // hardware. Degrade quickly (fast attack), recover slowly (slow release);
  // a recovery that's immediately regretted grows the recover dwell by the
  // back-off factor so the system settles instead of oscillating.
  // ShedDwellSeconds = 3
  // ShedRestoreDwellSeconds = 15
  // ShedRestoreBackoffFactor = 2
  // ShedMaxRestoreDwellSeconds = 300

  // Target per-camera capture rate. Captures are round-robined across
  // cameras so they don't all render + read back on the same frame
  // (bounds simultaneous GPU readbacks) and so each camera captures at
  // roughly this rate rather than the full game fps. Set >= your fps cap
  // to effectively disable staggering.
  // CaptureFps = 20

  // Default for the per-save Difficulty Setting "Throttle KSP main
  // render". When true on a fresh save, kerbcam disables the main
  // flight cameras (Camera 00 / ScaledSpace / GalaxyCamera) so
  // they don't compete with kerbcam's per-Hullcam encode pipeline.
  // Existing saves keep whatever value was last written via Pause
  // → Difficulty Settings → Kerbcam; this seed only applies to
  // saves that don't have the value stored yet.
  ThrottleMainScreen = false

  // Unity KeyCode the operator can press in flight to toggle the
  // throttle live without opening the Difficulty Settings menu.
  // Default unbound. Examples: ScrollLock, F12, Quote, Tilde.
  // Avoid M (map view) and other KSP-default bindings.
  // ThrottleMainScreenKey = ScrollLock

  // Apply HullcamVDS per-part shader filters (NightVision green
  // grain, MovieTime film, CRT scanlines etc — 9 modes total
  // selected per-part via the original Hullcam right-click GUI).
  // Default true so kerbcam streams show the same visual effects
  // as Hullcam's own in-game viewer. Set false to skip the filter
  // pass and stream the raw composite (useful for diagnostics).
  EnableHullcamEffects = true

  // Apply TUFX (TexturesUnlimitedFX) post-processing — tonemap,
  // bloom, colour grading — to each layered kerbcam camera when
  // TUFX is installed. Without it, atmospheric scattering on
  // Kerbin's horizon clips ugly-dark even with HDR enabled.
  // Default true; integration silently no-ops when TUFX is not
  // installed, so this setting can stay true regardless of mod
  // presence. Set false to force-disable even when TUFX is
  // available (e.g. perf-comparison runs).
  EnableTUFX = true

  // Name of the TUFX profile to attach to kerbcam's per-camera
  // PostProcessVolumes. Default empty → volumes inherit TUFX's
  // global scene selection (whatever the operator picked in TUFX's
  // UI for Flight). Set to "kerbcam" to use the curated profile
  // bundled at GameData/Kerbcam/TUFXProfiles/kerbcam.cfg (ACES
  // tonemap, SMAA, modest bloom). Default kept empty until the
  // curated profile is validated visually. No effect when TUFX
  // isn't installed.
  TUFXProfile =

  // Debug: extra per-camera diagnostic logs to KSP.log. Used for
  // investigating render-mask / cullingMask issues (e.g.
  // atmospheric FX missing from streams). Logs each cam's
  // cullingMask at attach time + periodically warns when our
  // mask diverges from the source KSP camera's. Verbose; leave
  // off for normal play.
  // DebugCameraLogging = false

  // Low-overhead performance telemetry. When true, the plugin times each
  // render phase (galaxy / scaled / near / blit / readback) per camera and
  // samples the Mono GC collection counters every frame, then surfaces a
  // compact "telemetry" section into global.status.json each ~1Hz write:
  // per-phase ms (summed across cameras + the interval's worst single-camera
  // spike), GC gen-0/1/2 collection counts for the interval, the worst frame
  // time and whether it coincided with a collection, the degrade level and
  // camera count. Lets you measure on the Deck (no profiler attach) whether the
  // residual frametime spikes are Mono GC — a worst-frame that coincides with a
  // gen-0/1/2 delta is the proof — and which render layer dominates the cost.
  // The timing path is allocation-free; default false so it's zero-cost off.
  // EnableTelemetry = false

  // Camera
  // {
  //   PartName = navCam1
  //   Layers = NEAR
  // }
  //
  // Camera
  // {
  //   PartName = aeroCam
  //   Layers = NEAR, SCALED
  // }
}
