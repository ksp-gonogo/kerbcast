// kerbcast settings. Loaded by KerbcastCore when the Flight scene loads.
// KSP ConfigNode format: only "//" line comments (no block comments).
// Omitted fields use the default shown; delete a line to reset it to default.
//
// This file ships with the mod and is OVERWRITTEN on every update. To make
// changes that survive updates, put them in
// GameData/Kerbcast/PluginData/settings.cfg instead (same format, create the
// folder and file yourself). Keys there override the values here; keys you
// leave out keep these defaults.
Settings
{
  // Network. Defaults to localhost, so only a browser on this same machine
  // can connect. To stream to another device, set this to your LAN IP, or
  // 0.0.0.0 for every interface. There is no authentication: anyone who can
  // reach this address can watch the feeds, so only open it on a trusted
  // network.
  BindAddress = 127.0.0.1
  Port = 8088

  // Capture resolution: choose a quality tier or uncomment explicit dims.
  //
  //   low     640x360,  2 Mbps  -- minimal GPU + encode cost
  //   sd      1024x576, inherit -- default; matches the old Width/Height default
  //   hd      1280x720, 6 Mbps
  //   fullhd  1920x1080, 10 Mbps -- experimental, memory-heavy
  //
  // Explicit Width, Height, or BitrateBps keys override the tier value for
  // that field; uncomment them below to force exact dimensions instead.
  // AdaptiveQuality (on by default) degrades BELOW this tier under load
  // and promotes back up to it after sustained headroom -- never above it.
  MaxQuality = sd

  // Explicit dimension overrides. Uncomment to bypass the tier table above.
  // Even numbers only (H.264 chroma subsampling). Applies to every camera.
  // Width = 1024
  // Height = 576

  // Target H.264 bitrate per stream, in bits per second. 0 = auto: the
  // sidecar picks a default for the encoder backend it selects (hardware
  // encoders get a higher default than the software fallback). Set a value
  // to override, e.g. 2500000 for 2.5 Mbps. Read once at sidecar launch;
  // if you run the sidecar by hand (AutoSpawnSidecar = false), pass
  // --bitrate-bps on its command line instead.
  // BitrateBps = 0

  // == Adaptive performance ==
  // Under load kerbcast captures fewer of the streaming cameras per frame,
  // round-robin: every camera still streams, just at a lower update rate, full
  // resolution and all layers each capture. It never drops render quality on
  // its own unless AdaptiveQuality (below) is enabled. The three values below
  // are ceilings, not guarantees.

  // Most main-thread time (ms/frame) kerbcast will spend on render + readback.
  // Higher means more cameras live per frame and lower game fps. Default 24
  // (about 6-7 cameras at ~3.5 ms each on a Steam Deck). 0 removes the cap and
  // leaves MinKspFps as the only limit.
  MaxKerbcastFrameBudgetMs = 24

  // Per-camera stream-rate ceiling. Each camera captures at most this often,
  // not at the full game framerate.
  MaxCaptureFps = 30

  // Physics floor. Below this fps KSP slows game-time and the streams go slow
  // motion, so kerbcast staggers harder to stay above it. One-way (only ever
  // tightens). 0 disables the floor.
  MinKspFps = 18

  // Also adapt render QUALITY (resolution, then FX layers) when capture
  // staggering above has no room left, and restore it, one step at a time,
  // after sustained headroom (about 30s quiet, plus a 60s hold-off after any
  // drop). Quality never rises above MaxQuality. Default true (on by default
  // since v0.22). Set false to restore the pre-v0.22 behaviour: only temporal
  // degrade (capture cadence), never resolution or layer changes. Each change
  // is logged to KSP.log as "[Kerbcast] stagger quality" with the reason.
  // AdaptiveQuality = true

  // == Main flight render ==
  // Seed for the per-save "Throttle KSP main render" difficulty setting. true
  // turns off KSP's own main flight view (Camera 00, ScaledSpace, GalaxyCamera)
  // to free the GPU for the camera streams. Worth it when you're watching the
  // feeds rather than the game window: it buys the cameras a few fps. Only
  // seeds saves that have not stored the value yet; toggle it live in
  // Pause > Difficulty Settings > Kerbcast.
  ThrottleMainScreen = false

  // == Visual effects ==
  // HullcamVDS per-part shader filters (night vision, film grain, CRT scanlines,
  // etc; chosen per part in Hullcam's right-click menu). false streams the raw
  // composite.
  EnableHullcamEffects = true

  // kerbcast's own re-entry / atmospheric overlay (plasma core, bowshock, trail,
  // embers). Override per camera below.
  EnableAtmosphericFx = true

  // Which atmospheric FX layers render: any of CORE, BOWSHOCK, TRAIL, EMBERS, or
  // ALL, comma-separated. Default ALL. Override per camera below.
  // AtmosphericFxLayers = ALL

  // Run TUFX post-processing on the kerbcast cameras. The streams inherit whatever
  // TUFX profile you have active in the in-game TUFX UI; there is no separate
  // kerbcast profile setting. Default true; no effect if TUFX isn't installed.
  EnableTUFX = true

  // Replicate EVE (Environmental Visual Enhancements) clouds, atmosphere, city
  // lights and celestial shadows onto the kerbcast cameras. Default true; no
  // effect if EVE isn't installed.
  EnableEVE = true

  // Replicate Scatterer atmosphere, sky, scattering and ocean onto the kerbcast
  // cameras (per-camera singleton swap). Default true; no effect if Scatterer
  // isn't installed. Forces MSAA off on the capture cameras when active.
  EnableScatterer = true

  // Re-run ParallaxContinued's scatter evaluate and draw for the kerbcast near
  // terrain camera so surface scatters (rocks, grass) appear on the stream.
  // Default true; no effect if ParallaxContinued isn't installed. Heaviest
  // integration; honours the active-scatters gate.
  EnableParallax = true

  // When the Deferred rendering mod is installed, add its forward-compatibility
  // component to kerbcast's deferred near/far cameras so they render correctly
  // instead of black. Default true; no effect if Deferred isn't installed.
  EnableDeferred = true

  // When the Firefly reentry mod is installed, capture its plasma onto the
  // kerbcast near camera INSTEAD of kerbcast's own reentry FX (never both).
  // Default true; set false to keep kerbcast's own reentry effects even when
  // Firefly is installed. No effect if Firefly isn't installed.
  EnableFirefly = true

  // Linux/Proton only: load a prebuilt Hullcam shader bundle because the stock
  // shaders do not load there. Default true; harmless on Windows.
  EnableHullcamLinuxShaderSwap = true

  // == Diagnostics ==
  // Verbose per-camera cullingMask logs to KSP.log. Off for normal play.
  // DebugCameraLogging = false

  // Per-render-phase timings and GC collection counters, written to a
  // "telemetry" block in global.status.json at ~1 Hz for on-device profiling.
  // Allocation-free when off.
  // EnableTelemetry = false

  // == Per-camera overrides ==
  // Zero or more Camera blocks, one per part, each keyed by PartName (KSP's
  // internal part name, case-sensitive; find it in the part's .cfg or in the
  // [Kerbcast] tracking lines of KSP.log). Any key you omit falls back to the
  // global value above. Supported keys:
  //
  //   Layers              Which scene layers this camera renders, comma-
  //                       separated: NEAR (terrain, parts, nearby vessels),
  //                       FAR (mid-range terrain band; keeps the horizon from
  //                       going black between the scaled and near handoff),
  //                       SCALED (distant planets and moons), GALAXY (the
  //                       skybox), or ALL. Dropping layers you don't need
  //                       (e.g. NEAR only on a docking cam) cuts that camera's
  //                       render cost, but a camera missing SCALED/GALAXY will
  //                       show empty space where planets or stars should be.
  //                       The sidecar's POST /cameras/{id}/layers overrides
  //                       this at runtime.
  //   EnableAtmosphericFx true/false, as the global key but for this camera.
  //   AtmosphericFxLayers CORE, BOWSHOCK, TRAIL, EMBERS, or ALL, as the global
  //                       key but for this camera.
  // Camera
  // {
  //   PartName = navCam1
  //   Layers = NEAR
  //   EnableAtmosphericFx = false
  // }
}
